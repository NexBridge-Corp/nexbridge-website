spec:
  name: nexbridge-website
  region: nyc
  static_sites:
    - name: nexbridge-web
      github:
        repo: NexBridge-Corp/nexbridge-website
        branch: main
        deploy_on_push: true
      build_command: npm ci && npm run build
      output_dir: dist
      catchall_document: index.html
      environment_slug: node-js
